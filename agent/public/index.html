<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenEMR AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); width: 100%; max-width: 680px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    header { background: #1a6ea8; color: #fff; padding: 16px 20px; font-size: 1rem; font-weight: 600; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; font-size: .9rem; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #1a6ea8; color: #fff; border-bottom-right-radius: 2px; }
    .msg.agent { align-self: flex-start; background: #eef2f7; color: #222; border-bottom-left-radius: 2px; }
    .msg.error { align-self: flex-start; background: #fde8e8; color: #b00; }
    #form { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e5e7eb; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: .9rem; outline: none; resize: none; height: 42px; }
    #input:focus { border-color: #1a6ea8; }
    button { padding: 10px 18px; background: #1a6ea8; color: #fff; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="app">
    <header>OpenEMR AI Agent</header>
    <div id="messages"></div>
    <form id="form">
      <textarea id="input" placeholder="Ask a clinical question…" rows="1"></textarea>
      <button type="submit" id="send">Send</button>
    </form>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const sessionId = `session-${Date.now()}`;

    function addMsg(text, role) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
      return el;
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      send.disabled = true;
      addMsg(message, 'user');
      const thinking = addMsg('…', 'agent');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId }),
        });
        const data = await res.json();
        thinking.textContent = data.error ?? data.text ?? JSON.stringify(data);
        if (data.error) thinking.className = 'msg error';
      } catch (err) {
        thinking.textContent = 'Request failed: ' + err.message;
        thinking.className = 'msg error';
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
